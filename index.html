<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="WIDE Agency - Social & App Development" />
    <title>WIDE Agency</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preload" as="image" type="image/webp" href="/frames/section-2/frame_0001.webp" />
    <link rel="preload" as="image" type="image/webp" href="/frames_9_16/section-2/frame_0001.webp" media="(max-width: 767px)" />
    <style>
      :root {
        --font-title: 'Outfit', sans-serif;
        --font-subtitle: 'Manrope', sans-serif;
        --font-body: 'Plus Jakarta Sans', sans-serif;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: var(--font-body);
        background: #000;
        color: #fff;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        /* Prevent iOS rubber-band bounce that interferes with GSAP pinned sections */
        overscroll-behavior: none;
      }
      /* Remove blue flash on tap (iOS/Android) */
      * {
        -webkit-tap-highlight-color: transparent;
      }
      /* Prevent double-tap zoom delay on interactive elements */
      button, a, [role="button"] {
        touch-action: manipulation;
      }
      /* Keep vertical scroll only on the page root — prevents accidental horizontal drift */
      html {
        touch-action: pan-y;
      }
      /* Tactile feedback on tap */
      button:active, a:active, [role="button"]:active {
        opacity: 0.82;
      }
      /* Respect reduced-motion preference */
      @media (prefers-reduced-motion: reduce) {
        *, ::before, ::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
