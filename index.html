<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="WIDE Agency - Social & App Development" />
    <title>WIDE Agency</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: #000;
        color: #fff;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        /* Prevent iOS rubber-band bounce that interferes with GSAP pinned sections */
        overscroll-behavior: none;
      }
      /* Remove blue flash on tap (iOS/Android) */
      * {
        -webkit-tap-highlight-color: transparent;
      }
      /* Prevent double-tap zoom delay on interactive elements */
      button, a, [role="button"] {
        touch-action: manipulation;
      }
      /* Keep vertical scroll only on the page root — prevents accidental horizontal drift */
      html {
        touch-action: pan-y;
      }
      /* Tactile feedback on tap */
      button:active, a:active, [role="button"]:active {
        opacity: 0.82;
      }
      /* Respect reduced-motion preference */
      @media (prefers-reduced-motion: reduce) {
        *, ::before, ::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
